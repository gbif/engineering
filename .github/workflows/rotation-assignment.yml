name: Rotation Assignment

on:
  schedule:
    # Run every Friday at 1:00 PM UTC (13:00)
    - cron: '0 13 * * 5'
  
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run in dry-run mode (no notifications sent)'
        required: false
        type: boolean
        default: false
      week_number:
        description: 'Specify week number (leave empty for current week)'
        required: false
        type: string

jobs:
  assign-rotations:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      issues: write
      pull-requests: write  # Add this line for broader permissions
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      
      - name: Validate configuration
        run: |
          python scripts/rotation-manager.py --validate-only
      
      - name: Debug environment variables
        if: github.event.inputs.dry_run == 'true'
        run: |
          echo "Checking environment variables (not showing values for security):"
          echo "SMTP_HOST is set: $([[ -n "$SMTP_HOST" ]] && echo 'YES' || echo 'NO')"
          echo "SMTP_PORT is set: $([[ -n "$SMTP_PORT" ]] && echo 'YES' || echo 'NO')"
          echo "SMTP_USERNAME is set: $([[ -n "$SMTP_USERNAME" ]] && echo 'YES' || echo 'NO')"
          echo "SMTP_PASSWORD is set: $([[ -n "$SMTP_PASSWORD" ]] && echo 'YES' || echo 'NO')"
          echo "SMTP_FROM_EMAIL is set: $([[ -n "$SMTP_FROM_EMAIL" ]] && echo 'YES' || echo 'NO')"
          echo "SLACK_WEBHOOK_URL is set: $([[ -n "$SLACK_WEBHOOK_URL" ]] && echo 'YES' || echo 'NO')"
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM_EMAIL: ${{ secrets.SMTP_FROM_EMAIL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      
      - name: Run rotation assignment (dry-run)
        if: github.event.inputs.dry_run == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM_EMAIL: ${{ secrets.SMTP_FROM_EMAIL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -n "${{ github.event.inputs.week_number }}" ]; then
            python scripts/rotation-manager.py --dry-run --week ${{ github.event.inputs.week_number }}
          else
            python scripts/rotation-manager.py --dry-run
          fi
      
      - name: Debug environment variables
        if: github.event.inputs.dry_run != 'true'
        run: |
          echo "Checking environment variables (not showing values for security):"
          echo "SMTP_HOST is set: $([[ -n "$SMTP_HOST" ]] && echo 'YES' || echo 'NO')"
          echo "SMTP_PORT is set: $([[ -n "$SMTP_PORT" ]] && echo 'YES' || echo 'NO')"
          echo "SMTP_USERNAME is set: $([[ -n "$SMTP_USERNAME" ]] && echo 'YES' || echo 'NO')"
          echo "SMTP_PASSWORD is set: $([[ -n "$SMTP_PASSWORD" ]] && echo 'YES' || echo 'NO')"
          echo "SMTP_FROM_EMAIL is set: $([[ -n "$SMTP_FROM_EMAIL" ]] && echo 'YES' || echo 'NO')"
          echo "SLACK_WEBHOOK_URL is set: $([[ -n "$SLACK_WEBHOOK_URL" ]] && echo 'YES' || echo 'NO')"
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM_EMAIL: ${{ secrets.SMTP_FROM_EMAIL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      
      - name: Run rotation assignment (production)
        if: github.event.inputs.dry_run != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM_EMAIL: ${{ secrets.SMTP_FROM_EMAIL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -n "${{ github.event.inputs.week_number }}" ]; then
            python scripts/rotation-manager.py --week ${{ github.event.inputs.week_number }}
          else
            python scripts/rotation-manager.py
          fi
