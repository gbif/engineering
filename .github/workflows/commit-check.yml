# .github/workflows/commit-check.yml
name: Commit Message Check

on:
  pull_request:
    branches:
      - main
      - master
      - dev

jobs:
  check-commits:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # needed to access full commit history

      - name: Check commit messages
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          MIN_LENGTH=20
          ISSUE_PATTERN="(#[0-9]+|https://github.com/.*/issues/[0-9]+)"
          FAILED=0

          COMMITS=$(git log ${BASE_SHA}..${HEAD_SHA} --format="%H")

          if [ -z "$COMMITS" ]; then
            echo "No commits to check"
            exit 0
          fi

          for COMMIT in $COMMITS; do
            MSG=$(git log --format=%B -n 1 $COMMIT | tr -d '\r')
            SHORT=$(echo "$MSG" | head -1)

            echo "-----------------------------"
            echo "Checking: $SHORT"

            # Skip merge commits
            if echo "$SHORT" | grep -qE "^Merge (pull request|branch)"; then
              echo "⏭️  Skipping merge commit"
              continue
            fi

            # Check minimum length (first line)
            if [ ${#SHORT} -lt $MIN_LENGTH ]; then
              echo "❌ Too short: ${#SHORT} chars (min $MIN_LENGTH)"
              FAILED=1
            else
              echo "✅ Length OK: ${#SHORT} chars"
            fi

            # Check issue reference (anywhere in message)
            if ! echo "$MSG" | grep -qE "$ISSUE_PATTERN"; then
              echo "❌ No issue reference found (expected #123)"
              FAILED=1
            else
              echo "✅ Issue reference found"
            fi
          done

          echo "-----------------------------"
          if [ $FAILED -eq 1 ]; then
            echo ""
            echo "💡 Commit messages must:"
            echo "   - Be at least $MIN_LENGTH characters"
            echo "   - Reference a GitHub issue (#123)"
            exit 1
          fi

          echo "✅ All commit messages are valid"